version: "3.9"

services:
  # ── InServiceHub Server (Node.js + React SPA) ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: inservicehub_prod
    restart: always
    ports:
      - "${PORT:-5001}:5001"
    environment:
      PORT: 5001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change_me_to_random_secret}
      DATABASE_URL: ${DATABASE_URL}
      DB_SSL: ${DB_SSL:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
